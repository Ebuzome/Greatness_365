        /* ========== NEW DROPDOWN PLATFORM SELECTOR (TOGGLE) ========== */

            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }
        .platform-toggle-btn {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(240,185,11,0.3);
            border-radius: 40px;
            padding: 0.65rem 2rem 0.65rem 1.8rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            color: #eee;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .platform-toggle-btn:hover {
            border-color: #F0B90B;
            background: rgba(240,185,11,0.1);
        }
        .platform-toggle-btn i {
            color: #F0B90B;
            font-size: 1.2rem;
            transition: transform 0.3s;
        }
        .platform-toggle-btn.open i {
            transform: rotate(180deg);
        }
        .platform-dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 12px);
            left: 0;
            background: rgba(20,25,30,0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(240,185,11,0.2);
            border-radius: 30px;
            padding: 0.8rem 0;
            min-width: 240px;
            box-shadow: 0 25px 40px -10px black;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
            z-index: 50;
        }
        .dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .platform-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1.8rem;
            cursor: pointer;
            transition: background 0.1s;
            color: #ddd;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .platform-item:hover {
            background: rgba(240,185,11,0.15);
            color: white;
        }
        .platform-item img {
            width: 22px;
            height: 22px;
            object-fit: contain;
            border-radius: 4px;
            background: transparent;
        }
        .platform-item span { flex:1; }
        .platform-item:last-child { border-bottom: none; }

        /* Visits & cookies summary cards */

        /* ---------- TABLE (COMPACT) with hover actions ---------- */
        .table-section {
            border-radius: 28px;
            padding: 1.5rem;
            border-bottom: 3px solid #F0B90B;

        .row-hover-actions {
            position: absolute;
            right: 10px; top: 50%; transform: translateY(-50%);
            display: flex; gap: 8px; background: rgba(30,35,41,0.9);
            padding: 4px 8px; border-radius: 40px; border:1px solid #F0B90B;
            opacity:0; transition:0.15s; pointer-events: none;

        tr:hover .row-hover-actions {
            opacity:1; pointer-events: auto;
        }
        .action-btn {
            background: transparent; border:none; color:#F0B90B; cursor:pointer;
            font-size:0.9rem; padding:4px 6px; border-radius:30px;

        .action-btn:hover { background: rgba(240,185,11,0.2); }

        /* grid layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.2rem;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        .grid-card {
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(240,185,11,0.15);

        .grid-card .field { display:flex; font-size:0.85rem; border-bottom:1px dashed #333; padding:4px 0; }
        .field .label { width:90px; color:#aaa; }

        .grid-card .row-actions { display: flex; gap: 1rem; margin-top: 0.5rem; }
        .grid-card .action-btn { background:rgba(240,185,11,0.1); padding:0.3rem 1rem; }

        /* modal */
        .modal-overlay {

        .modal-content {
            background: #1E2329; border-radius: 40px; padding: 2rem; width:500px; max-width:96%;
            border:1px solid rgba(240,185,11,0.3); border-bottom:3px solid #F0B90B;

        .modal-content h2 { display:flex; gap:1rem; margin-bottom:1.5rem; }
        .detail-row { display:flex; margin-bottom:0.8rem; border-bottom:1px solid #2a2f35; padding-bottom:6px; }
        .detail-label { width:130px; color:#aaa; }
        .detail-value { color:white; word-break:break-word; }
        .detail-value .cookie-file { color:#F0B90B; font-style:italic; }
        .modal-actions { display:flex; gap:1rem; justify-content:flex-end; margin-top:2rem; }
        .modal-btn { padding:0.7rem 2rem; border-radius:30px; border:none; cursor:pointer; }
        .modal-btn.primary { background:#F0B90B; color:#1E2329; }
