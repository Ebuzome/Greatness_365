        /* ---------- ELECTRIC OVERLAY – FLOWING LIGHT RAYS ---------- */
        .electric-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .light-ray {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent 0px,
                transparent 40px,
                rgba(252, 213, 53, 0.08) 40px,
                rgba(252, 213, 53, 0.15) 41px,
                transparent 41px,
                transparent 80px
            );
            background-size: 200% 200%;
            animation: flowRays 18s linear infinite;
            opacity: 0.6;
            mix-blend-mode: overlay;
        }

        .light-ray.secondary {
            background: repeating-linear-gradient(
                -45deg,
                transparent 0px,
                transparent 60px,
                rgba(252, 213, 53, 0.06) 60px,
                rgba(252, 213, 53, 0.12) 61px,
                transparent 61px,
                transparent 120px
            );
            animation: flowRays 24s linear infinite reverse;
            opacity: 0.5;
        }

        @keyframes flowRays {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(10%, 10%) rotate(2deg); }
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #FCD535;
            border-radius: 50%;
            box-shadow: 0 0 8px 2px rgba(252, 213, 53, 0.6);
            opacity: 0;
            animation: sparkle 4s infinite ease-in-out;
        }

        .particle:nth-child(1) { top: 15%; left: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 30%; left: 70%; animation-delay: 1.2s; width: 3px; height: 3px; }
        .particle:nth-child(3) { top: 55%; left: 45%; animation-delay: 2.5s; }
        .particle:nth-child(4) { top: 75%; left: 15%; animation-delay: 0.7s; width: 4px; height: 4px; }
        .particle:nth-child(5) { top: 85%; left: 80%; animation-delay: 1.8s; }
        .particle:nth-child(6) { top: 45%; left: 90%; animation-delay: 3.2s; width: 3px; height: 3px; }
        .particle:nth-child(7) { top: 10%; left: 55%; animation-delay: 2.1s; }
        .particle:nth-child(8) { top: 65%; left: 30%; animation-delay: 0.3s; }
        .particle:nth-child(9) { top: 22%; left: 85%; animation-delay: 1.5s; width: 4px; height: 4px; }
        .particle:nth-child(10) { top: 92%; left: 25%; animation-delay: 2.8s; }
        .particle:nth-child(11) { top: 40%; left: 12%; animation-delay: 0.9s; }
        .particle:nth-child(12) { top: 68%; left: 68%; animation-delay: 3.5s; }

        @keyframes sparkle {
            0% { opacity: 0; transform: scale(0.5) translateY(0); }
            20% { opacity: 1; transform: scale(1.2) translateY(-5px); }
            40% { opacity: 0.8; transform: scale(1) translateY(5px); }
            60% { opacity: 1; transform: scale(1.5) translateY(-3px); }
            80% { opacity: 0.5; transform: scale(0.8) translateY(3px); }
            100% { opacity: 0; transform: scale(0.2) translateY(0); }
        }

    <script>
        (function() {
            // Active nav switching (excluding anchor links)
            const navLinks = document.querySelectorAll('.nav-link:not([href])');
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    navLinks.forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // Copy button feedback
            const copyBtns = document.querySelectorAll('.btn-copy');
            copyBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const originalHTML = this.innerHTML;
                    this.innerHTML = '<i class="fas fa-check"></i> Copied!';
                    this.style.background = 'rgba(252, 213, 53, 0.25)';
                    setTimeout(() => {
                        this.innerHTML = originalHTML;
                        this.style.background = '';
                    }, 800);
                });
            });

            // Open button simulation
            const openBtns = document.querySelectorAll('.btn-open');
            openBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    alert('[Demo] Open link – no actual URL configured.');

        })();
